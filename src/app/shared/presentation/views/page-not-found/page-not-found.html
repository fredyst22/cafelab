<div class="page-not-found-container">
  <div class="page-not-found-content">
    <div class="error-icon">
      <mat-icon>error_outline</mat-icon>
    </div>
    <h1 class="page-not-found-title">{{ 'page-not-found.title' | translate }}</h1>
    <p class="page-not-found-message" [innerHTML]="'page-not-found.content' | translate: { invalid_path: invalidPath }"></p>
    <div class="page-not-found-actions">
      <button mat-raised-button 
              color="primary" 
              (click)="navigateToHome()"
              class="home-button">
        {{ 'page-not-found.go-home' | translate }}
      </button>
    </div>
  </div>
</div>
